groups:
  - name: circles-kpi-aggregations
    interval: 1m
    rules:
      # User metrics - record for persistence
      - record: circles:total_humans:sum
        expr: sum(circles_total_humans)

      - record: circles:total_humans_v1:gauge
        expr: circles_total_humans{version="v1"}

      - record: circles:total_humans_v2:gauge
        expr: circles_total_humans{version="v2"}

      - record: circles:total_groups:gauge
        expr: circles_total_groups

      - record: circles:total_organizations:gauge
        expr: circles_total_organizations

      # Trust metrics
      - record: circles:active_trusts:gauge
        expr: circles_active_trusts

      - record: circles:new_trusts_24h:gauge
        expr: circles_new_trusts{window="24h"}

      # Economic metrics
      - record: circles:total_backers:gauge
        expr: circles_total_backers

      - record: circles:active_minters_24h:gauge
        expr: circles_active_minters{window="24h"}

      - record: circles:daily_mint_volume:gauge
        expr: circles_daily_mint_volume_crc

      - record: circles:daily_transfer_volume:gauge
        expr: circles_daily_transfer_volume_crc

      - record: circles:daily_transfer_count:gauge
        expr: circles_daily_transfer_count

  - name: circles-rpc-aggregations
    interval: 1m
    rules:
      # Request rate by method (1m rate)
      - record: circles:rpc_requests_per_second:rate1m
        expr: sum(rate(circles_rpc_requests_total[1m])) by (method)

      # Total request rate
      - record: circles:rpc_requests_per_second:total_rate1m
        expr: sum(rate(circles_rpc_requests_total[1m]))

      # Error rate by method
      - record: circles:rpc_errors_per_second:rate1m
        expr: sum(rate(circles_rpc_errors_total[1m])) by (method, error_type)

      # Latency percentiles
      - record: circles:rpc_latency_p50:gauge
        expr: histogram_quantile(0.50, rate(circles_rpc_request_duration_seconds_bucket[5m]))

      - record: circles:rpc_latency_p95:gauge
        expr: histogram_quantile(0.95, rate(circles_rpc_request_duration_seconds_bucket[5m]))

      - record: circles:rpc_latency_p99:gauge
        expr: histogram_quantile(0.99, rate(circles_rpc_request_duration_seconds_bucket[5m]))

  - name: circles-cache-aggregations
    interval: 1m
    rules:
      # Cache size trends
      - record: circles:cache_total_entries:gauge
        expr: circles_cache_entries_total

      - record: circles:cache_avatars_total:gauge
        expr: circles_cache_v1_avatars_total + circles_cache_v2_avatars_total

      # Block processing rate
      - record: circles:cache_blocks_per_minute:rate1m
        expr: rate(circles_cache_blocks_processed_total[1m]) * 60

  - name: circles-dune-parity-aggregations
    interval: 1m
    rules:
      # Daily mint count (number of mints, not volume)
      - record: circles:daily_mint_count:gauge
        expr: circles_daily_mint_count

      # New backers by window
      - record: circles:new_backers_24h:gauge
        expr: circles_new_backers{window="24h"}

      - record: circles:new_backers_7d:gauge
        expr: circles_new_backers{window="7d"}

      - record: circles:new_backers_30d:gauge
        expr: circles_new_backers{window="30d"}

      # 14-day minting fraction (engagement metric)
      - record: circles:minting_fraction_14d:gauge
        expr: circles_minting_fraction_14d

      # New organizations by window
      - record: circles:new_organizations_24h:gauge
        expr: circles_new_organizations{window="24h"}

      - record: circles:new_organizations_7d:gauge
        expr: circles_new_organizations{window="7d"}

      - record: circles:new_organizations_30d:gauge
        expr: circles_new_organizations{window="30d"}

      # New groups by window
      - record: circles:new_groups_24h:gauge
        expr: circles_new_groups{window="24h"}

      - record: circles:new_groups_7d:gauge
        expr: circles_new_groups{window="7d"}

      - record: circles:new_groups_30d:gauge
        expr: circles_new_groups{window="30d"}

  - name: circles-activity-rates-aggregations
    interval: 1m
    rules:
      # Minting rate (% of users who minted in window)
      - record: circles:minting_rate_14d:gauge
        expr: circles_minting_rate{window="14d"}

      - record: circles:minting_rate_30d:gauge
        expr: circles_minting_rate{window="30d"}

      - record: circles:minting_rate_90d:gauge
        expr: circles_minting_rate{window="90d"}

      - record: circles:minting_rate_180d:gauge
        expr: circles_minting_rate{window="180d"}

      - record: circles:minting_rate_1y:gauge
        expr: circles_minting_rate{window="1y"}

      # Spending rate (% of users who transferred in window)
      - record: circles:spending_rate_14d:gauge
        expr: circles_spending_rate{window="14d"}

      - record: circles:spending_rate_30d:gauge
        expr: circles_spending_rate{window="30d"}

      - record: circles:spending_rate_90d:gauge
        expr: circles_spending_rate{window="90d"}

      - record: circles:spending_rate_180d:gauge
        expr: circles_spending_rate{window="180d"}

      - record: circles:spending_rate_1y:gauge
        expr: circles_spending_rate{window="1y"}

      # Transfer volume by window
      - record: circles:transfer_volume_24h:gauge
        expr: circles_transfer_volume{window="24h"}

      - record: circles:transfer_volume_7d:gauge
        expr: circles_transfer_volume{window="7d"}

      - record: circles:transfer_volume_30d:gauge
        expr: circles_transfer_volume{window="30d"}

      - record: circles:transfer_volume_90d:gauge
        expr: circles_transfer_volume{window="90d"}

      - record: circles:transfer_volume_180d:gauge
        expr: circles_transfer_volume{window="180d"}

      - record: circles:transfer_volume_1y:gauge
        expr: circles_transfer_volume{window="1y"}

      # Mint volume by window
      - record: circles:mint_volume_24h:gauge
        expr: circles_mint_volume{window="24h"}

      - record: circles:mint_volume_7d:gauge
        expr: circles_mint_volume{window="7d"}

      - record: circles:mint_volume_30d:gauge
        expr: circles_mint_volume{window="30d"}

      # Transfer count by window
      - record: circles:transfer_count_24h:gauge
        expr: circles_transfer_count{window="24h"}

      - record: circles:transfer_count_7d:gauge
        expr: circles_transfer_count{window="7d"}

      - record: circles:transfer_count_30d:gauge
        expr: circles_transfer_count{window="30d"}

      - record: circles:transfer_count_90d:gauge
        expr: circles_transfer_count{window="90d"}

      - record: circles:transfer_count_180d:gauge
        expr: circles_transfer_count{window="180d"}

      - record: circles:transfer_count_1y:gauge
        expr: circles_transfer_count{window="1y"}

      # Average transfer amount by window
      - record: circles:average_transfer_amount_24h:gauge
        expr: circles_average_transfer_amount_crc{window="24h"}

      - record: circles:average_transfer_amount_7d:gauge
        expr: circles_average_transfer_amount_crc{window="7d"}

      - record: circles:average_transfer_amount_30d:gauge
        expr: circles_average_transfer_amount_crc{window="30d"}

      # Median transfer amount by window
      - record: circles:median_transfer_amount_24h:gauge
        expr: circles_median_transfer_amount_crc{window="24h"}

      - record: circles:median_transfer_amount_7d:gauge
        expr: circles_median_transfer_amount_crc{window="7d"}

      - record: circles:median_transfer_amount_30d:gauge
        expr: circles_median_transfer_amount_crc{window="30d"}

  - name: circles-sybil-detection-aggregations
    interval: 1m
    rules:
      # Accounts without profile metadata
      - record: circles:accounts_without_profile:gauge
        expr: circles_accounts_without_profile

      # Accounts with no incoming trust
      - record: circles:accounts_without_incoming_trust:gauge
        expr: circles_accounts_without_incoming_trust

      # Batch registrations (same block)
      - record: circles:batch_registrations_24h:gauge
        expr: circles_batch_registrations{window="24h"}

      # Mint-and-drain accounts
      - record: circles:mint_and_drain_accounts_24h:gauge
        expr: circles_mint_and_drain_accounts{window="24h"}

      - record: circles:mint_and_drain_accounts_7d:gauge
        expr: circles_mint_and_drain_accounts{window="7d"}

      # High-volume inviters
      - record: circles:high_volume_inviters_24h:gauge
        expr: circles_high_volume_inviters{window="24h"}

      - record: circles:high_volume_inviters_7d:gauge
        expr: circles_high_volume_inviters{window="7d"}

      # Suspicious vs organic accounts
      - record: circles:suspicious_accounts:gauge
        expr: circles_suspicious_accounts

      - record: circles:organic_accounts:gauge
        expr: circles_organic_accounts

      # Ratio of suspicious to total accounts
      - record: circles:suspicious_account_ratio:gauge
        expr: circles_suspicious_accounts / (circles_suspicious_accounts + circles_organic_accounts)

  - name: circles-network-health-aggregations
    interval: 1m
    rules:
      # Average trust connections per avatar
      - record: circles:average_trust_connections:gauge
        expr: circles_average_trust_connections

      # Isolated accounts (no trusts)
      - record: circles:isolated_accounts:gauge
        expr: circles_isolated_accounts

      # Isolation rate
      - record: circles:isolation_rate:gauge
        expr: circles_isolated_accounts / sum(circles_total_humans)

  - name: circles-health-endpoint-aggregations
    interval: 1m
    rules:
      # Service readiness by service
      - record: circles:service_ready:gauge
        expr: probe_success{job="blackbox-ready"}

      # Service liveness by service
      - record: circles:service_alive:gauge
        expr: probe_success{job="blackbox-live"}

      # Health check latency by service
      - record: circles:health_check_latency:gauge
        expr: probe_duration_seconds{job=~"blackbox-.*"}

  # Pre-computed uptime metrics for longer timeframes (expensive to calculate on-the-fly)
  - name: circles-uptime-aggregations
    interval: 5m
    rules:
      # Service uptime 7d (percentage)
      - record: circles:uptime_7d:avg
        expr: avg_over_time(probe_success{job=~"blackbox-.*"}[7d]) * 100
        labels:
          window: "7d"

      # Service uptime 30d (percentage)
      - record: circles:uptime_30d:avg
        expr: avg_over_time(probe_success{job=~"blackbox-.*"}[30d]) * 100
        labels:
          window: "30d"

      # Caddy traffic 7d total
      - record: circles:caddy_requests_7d:sum
        expr: sum(increase(caddy_http_requests_total{job="caddy"}[7d]))

      # Caddy traffic 30d total
      - record: circles:caddy_requests_30d:sum
        expr: sum(increase(caddy_http_requests_total{job="caddy"}[30d]))

  - name: circles-advanced-monetary-aggregations
    interval: 1m
    rules:
      # Total CRC supply in circulation
      - record: circles:total_crc_supply:gauge
        expr: circles_total_crc_supply

      # Total minted all time
      - record: circles:total_minted_all_time:gauge
        expr: circles_total_minted_all_time_crc

      # Demurrage paid by window
      - record: circles:demurrage_paid_24h:gauge
        expr: circles_demurrage_paid_crc{window="24h"}

      - record: circles:demurrage_paid_7d:gauge
        expr: circles_demurrage_paid_crc{window="7d"}

      - record: circles:demurrage_paid_30d:gauge
        expr: circles_demurrage_paid_crc{window="30d"}

      # Money velocity (transfer volume / supply)
      - record: circles:money_velocity_7d:gauge
        expr: circles_money_velocity{window="7d"}

      - record: circles:money_velocity_30d:gauge
        expr: circles_money_velocity{window="30d"}

      - record: circles:money_velocity_90d:gauge
        expr: circles_money_velocity{window="90d"}

      # Active balance holders
      - record: circles:active_balance_holders:gauge
        expr: circles_active_balance_holders

      # Balance distribution
      - record: circles:average_balance:gauge
        expr: circles_average_balance_crc

      - record: circles:median_balance:gauge
        expr: circles_median_balance_crc

      # Wealth equality (Gini coefficient)
      - record: circles:gini_coefficient:gauge
        expr: circles_gini_coefficient

      # Top holder concentration
      - record: circles:top_10_holder_concentration:gauge
        expr: circles_top_holder_concentration{top_n="10"}

      - record: circles:top_100_holder_concentration:gauge
        expr: circles_top_holder_concentration{top_n="100"}

      - record: circles:top_1000_holder_concentration:gauge
        expr: circles_top_holder_concentration{top_n="1000"}

      # Daily/Weekly/Monthly active wallets (DAW/WAW/MAW)
      - record: circles:daily_active_wallets:gauge
        expr: circles_daily_active_wallets

      - record: circles:weekly_active_wallets:gauge
        expr: circles_weekly_active_wallets

      - record: circles:monthly_active_wallets:gauge
        expr: circles_monthly_active_wallets

      # DAW/MAW ratio (stickiness)
      - record: circles:wallet_stickiness:gauge
        expr: circles_daily_active_wallets / circles_monthly_active_wallets

      # User retention rate
      - record: circles:user_retention_7d:gauge
        expr: circles_user_retention_rate{window="7d"}

      - record: circles:user_retention_30d:gauge
        expr: circles_user_retention_rate{window="30d"}

      # First-time transactors
      - record: circles:first_time_transactors_24h:gauge
        expr: circles_first_time_transactors{window="24h"}

      - record: circles:first_time_transactors_7d:gauge
        expr: circles_first_time_transactors{window="7d"}

      - record: circles:first_time_transactors_30d:gauge
        expr: circles_first_time_transactors{window="30d"}

      # Transfer size percentiles (24h)
      - record: circles:transfer_size_p10_24h:gauge
        expr: circles_transfer_size_percentile_crc{percentile="p10", window="24h"}

      - record: circles:transfer_size_p25_24h:gauge
        expr: circles_transfer_size_percentile_crc{percentile="p25", window="24h"}

      - record: circles:transfer_size_p75_24h:gauge
        expr: circles_transfer_size_percentile_crc{percentile="p75", window="24h"}

      - record: circles:transfer_size_p90_24h:gauge
        expr: circles_transfer_size_percentile_crc{percentile="p90", window="24h"}

      # Micro transactions (< 1 CRC)
      - record: circles:micro_transactions_24h:gauge
        expr: circles_micro_transaction_count{window="24h"}

      - record: circles:micro_transactions_7d:gauge
        expr: circles_micro_transaction_count{window="7d"}

      # Large transactions (> 100 CRC)
      - record: circles:large_transactions_24h:gauge
        expr: circles_large_transaction_count{window="24h"}

      - record: circles:large_transactions_7d:gauge
        expr: circles_large_transaction_count{window="7d"}

      # Micro transaction ratio (potential spam indicator)
      - record: circles:micro_transaction_ratio_24h:gauge
        expr: circles_micro_transaction_count{window="24h"} / circles_transfer_count{window="24h"}

      # Net inflow (new CRC minted)
      - record: circles:net_inflow_24h:gauge
        expr: circles_net_inflow_crc{window="24h"}

      - record: circles:net_inflow_7d:gauge
        expr: circles_net_inflow_crc{window="7d"}

      - record: circles:net_inflow_30d:gauge
        expr: circles_net_inflow_crc{window="30d"}

      # Supply growth rate (inflow / supply)
      - record: circles:supply_growth_rate_24h:gauge
        expr: circles_net_inflow_crc{window="24h"} / circles_total_crc_supply

      - record: circles:supply_growth_rate_7d:gauge
        expr: circles_net_inflow_crc{window="7d"} / circles_total_crc_supply

  # MTTR (Mean Time To Recovery) metrics
  # Tracks incident duration from alert firing to resolution
  - name: circles-mttr-aggregations
    interval: 1m
    rules:
      # Track when services transition from down to up (recovery events)
      # This counts the number of times a service recovered in the window
      - record: circles:recovery_events:increase
        expr: |
          increase(
            (probe_success{job=~"blackbox-ready|blackbox-live|blackbox-nethermind|blackbox-consensus"} == 1)
            and
            (probe_success{job=~"blackbox-ready|blackbox-live|blackbox-nethermind|blackbox-consensus"} offset 1m == 0)
          [1h])
        labels:
          window: "1h"

      # Track downtime duration per incident window
      # Uses ALERTS metric to track how long alerts have been firing
      - record: circles:incident_duration_seconds:sum
        expr: |
          sum by (alertname, service, job) (
            ALERTS_FOR_STATE{alertstate="firing", alertname=~"ServiceNotReady|ServiceNotAlive|NethermindNotHealthy|ConsensusNotHealthy|ExternalEndpointDown"}
          )

      # Count of incidents that fired in the last 24h
      - record: circles:incidents_24h:count
        expr: |
          count by (alertname) (
            changes(ALERTS{alertstate="firing", alertname=~"ServiceNotReady|ServiceNotAlive|NethermindNotHealthy|ConsensusNotHealthy|ExternalEndpointDown"}[24h]) > 0
          )
        labels:
          window: "24h"

      # Count of incidents that fired in the last 7d
      - record: circles:incidents_7d:count
        expr: |
          count by (alertname) (
            changes(ALERTS{alertstate="firing", alertname=~"ServiceNotReady|ServiceNotAlive|NethermindNotHealthy|ConsensusNotHealthy|ExternalEndpointDown"}[7d]) > 0
          )
        labels:
          window: "7d"

      # Total downtime seconds in last 24h (for MTTR calculation)
      # Based on probe failures - each failed probe represents ~scrape_interval of downtime
      - record: circles:downtime_seconds_24h:sum
        expr: |
          sum by (job, service) (
            (1 - avg_over_time(probe_success{job=~"blackbox-ready|blackbox-live"}[24h])) * 86400
          )
        labels:
          window: "24h"

      # Total downtime seconds in last 7d
      - record: circles:downtime_seconds_7d:sum
        expr: |
          sum by (job, service) (
            (1 - avg_over_time(probe_success{job=~"blackbox-ready|blackbox-live"}[7d])) * 604800
          )
        labels:
          window: "7d"

      # MTTR estimate: total downtime / number of incidents
      # This gives average recovery time per incident
      - record: circles:mttr_seconds_24h:avg
        expr: |
          (
            (1 - avg_over_time(probe_success{job=~"blackbox-ready|blackbox-live"}[24h])) * 86400
          )
          /
          (
            changes(probe_success{job=~"blackbox-ready|blackbox-live"}[24h]) / 2 + 1
          )
        labels:
          window: "24h"

      # MTTR for 7d window
      - record: circles:mttr_seconds_7d:avg
        expr: |
          (
            (1 - avg_over_time(probe_success{job=~"blackbox-ready|blackbox-live"}[7d])) * 604800
          )
          /
          (
            changes(probe_success{job=~"blackbox-ready|blackbox-live"}[7d]) / 2 + 1
          )
        labels:
          window: "7d"

  - name: circles-account-type-aggregations
    interval: 1m
    rules:
      # Gini coefficient by account type
      - record: circles:gini_humans:gauge
        expr: circles_gini_coefficient_by_type{account_type="human"}

      - record: circles:gini_groups:gauge
        expr: circles_gini_coefficient_by_type{account_type="group"}

      - record: circles:gini_organizations:gauge
        expr: circles_gini_coefficient_by_type{account_type="organization"}

      # Total balance by account type
