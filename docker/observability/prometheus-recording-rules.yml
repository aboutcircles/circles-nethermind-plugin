groups:
  - name: circles-kpi-aggregations
    interval: 1m
    rules:
      # User metrics - record for persistence
      - record: circles:total_humans:sum
        expr: sum(circles_total_humans)

      - record: circles:total_humans_v1:gauge
        expr: circles_total_humans{version="v1"}

      - record: circles:total_humans_v2:gauge
        expr: circles_total_humans{version="v2"}

      - record: circles:total_groups:gauge
        expr: circles_total_groups

      - record: circles:total_organizations:gauge
        expr: circles_total_organizations

      # Trust metrics
      - record: circles:active_trusts:gauge
        expr: circles_active_trusts

      - record: circles:new_trusts_24h:gauge
        expr: circles_new_trusts{window="24h"}

      # Economic metrics
      - record: circles:total_backers:gauge
        expr: circles_total_backers

      - record: circles:active_minters_24h:gauge
        expr: circles_active_minters{window="24h"}

      - record: circles:daily_mint_volume:gauge
        expr: circles_daily_mint_volume_crc

      - record: circles:daily_transfer_volume:gauge
        expr: circles_daily_transfer_volume_crc

      - record: circles:daily_transfer_count:gauge
        expr: circles_daily_transfer_count

  - name: circles-rpc-aggregations
    interval: 1m
    rules:
      # Request rate by method (1m rate)
      - record: circles:rpc_requests_per_second:rate1m
        expr: sum(rate(circles_rpc_requests_total[1m])) by (method)

      # Total request rate
      - record: circles:rpc_requests_per_second:total_rate1m
        expr: sum(rate(circles_rpc_requests_total[1m]))

      # Error rate by method
      - record: circles:rpc_errors_per_second:rate1m
        expr: sum(rate(circles_rpc_errors_total[1m])) by (method, error_type)

      # Latency percentiles
      - record: circles:rpc_latency_p50:gauge
        expr: histogram_quantile(0.50, rate(circles_rpc_request_duration_seconds_bucket[5m]))

      - record: circles:rpc_latency_p95:gauge
        expr: histogram_quantile(0.95, rate(circles_rpc_request_duration_seconds_bucket[5m]))

      - record: circles:rpc_latency_p99:gauge
        expr: histogram_quantile(0.99, rate(circles_rpc_request_duration_seconds_bucket[5m]))

  - name: circles-cache-aggregations
    interval: 1m
    rules:
      # Cache size trends
      - record: circles:cache_total_entries:gauge
        expr: circles_cache_entries_total

      - record: circles:cache_avatars_total:gauge
        expr: circles_cache_v1_avatars_total + circles_cache_v2_avatars_total

      # Block processing rate
      - record: circles:cache_blocks_per_minute:rate1m
        expr: rate(circles_cache_blocks_processed_total[1m]) * 60

  - name: circles-dune-parity-aggregations
    interval: 1m
    rules:
      # Daily mint count (number of mints, not volume)
      - record: circles:daily_mint_count:gauge
        expr: circles_daily_mint_count

      # New backers by window
      - record: circles:new_backers_24h:gauge
        expr: circles_new_backers{window="24h"}

      - record: circles:new_backers_7d:gauge
        expr: circles_new_backers{window="7d"}

      - record: circles:new_backers_30d:gauge
        expr: circles_new_backers{window="30d"}

      # 14-day minting fraction (engagement metric)
      - record: circles:minting_fraction_14d:gauge
        expr: circles_minting_fraction_14d

      # New organizations by window
      - record: circles:new_organizations_24h:gauge
        expr: circles_new_organizations{window="24h"}

      - record: circles:new_organizations_7d:gauge
        expr: circles_new_organizations{window="7d"}

      - record: circles:new_organizations_30d:gauge
        expr: circles_new_organizations{window="30d"}

      # New groups by window
      - record: circles:new_groups_24h:gauge
        expr: circles_new_groups{window="24h"}

      - record: circles:new_groups_7d:gauge
        expr: circles_new_groups{window="7d"}

      - record: circles:new_groups_30d:gauge
        expr: circles_new_groups{window="30d"}

  - name: circles-activity-rates-aggregations
    interval: 1m
    rules:
      # Minting rate (% of users who minted in window)
      - record: circles:minting_rate_14d:gauge
        expr: circles_minting_rate{window="14d"}

      - record: circles:minting_rate_30d:gauge
        expr: circles_minting_rate{window="30d"}

      - record: circles:minting_rate_90d:gauge
        expr: circles_minting_rate{window="90d"}

      # Spending rate (% of users who transferred in window)
      - record: circles:spending_rate_14d:gauge
        expr: circles_spending_rate{window="14d"}

      - record: circles:spending_rate_30d:gauge
        expr: circles_spending_rate{window="30d"}

      - record: circles:spending_rate_90d:gauge
        expr: circles_spending_rate{window="90d"}

      # Transfer volume by window
      - record: circles:transfer_volume_24h:gauge
        expr: circles_transfer_volume{window="24h"}

      - record: circles:transfer_volume_7d:gauge
        expr: circles_transfer_volume{window="7d"}

      - record: circles:transfer_volume_30d:gauge
        expr: circles_transfer_volume{window="30d"}

      # Mint volume by window
      - record: circles:mint_volume_24h:gauge
        expr: circles_mint_volume{window="24h"}

      - record: circles:mint_volume_7d:gauge
        expr: circles_mint_volume{window="7d"}

      - record: circles:mint_volume_30d:gauge
        expr: circles_mint_volume{window="30d"}

      # Transfer count by window
      - record: circles:transfer_count_24h:gauge
        expr: circles_transfer_count{window="24h"}

      - record: circles:transfer_count_7d:gauge
        expr: circles_transfer_count{window="7d"}

      - record: circles:transfer_count_30d:gauge
        expr: circles_transfer_count{window="30d"}

      # Average transfer amount by window
      - record: circles:average_transfer_amount_24h:gauge
        expr: circles_average_transfer_amount_crc{window="24h"}

      - record: circles:average_transfer_amount_7d:gauge
        expr: circles_average_transfer_amount_crc{window="7d"}

      - record: circles:average_transfer_amount_30d:gauge
        expr: circles_average_transfer_amount_crc{window="30d"}

      # Median transfer amount by window
      - record: circles:median_transfer_amount_24h:gauge
        expr: circles_median_transfer_amount_crc{window="24h"}

      - record: circles:median_transfer_amount_7d:gauge
        expr: circles_median_transfer_amount_crc{window="7d"}

      - record: circles:median_transfer_amount_30d:gauge
        expr: circles_median_transfer_amount_crc{window="30d"}

  - name: circles-sybil-detection-aggregations
    interval: 1m
    rules:
      # Accounts without profile metadata
      - record: circles:accounts_without_profile:gauge
        expr: circles_accounts_without_profile

      # Accounts with no incoming trust
      - record: circles:accounts_without_incoming_trust:gauge
        expr: circles_accounts_without_incoming_trust

      # Batch registrations (same block)
      - record: circles:batch_registrations_24h:gauge
        expr: circles_batch_registrations{window="24h"}

      # Mint-and-drain accounts
      - record: circles:mint_and_drain_accounts_24h:gauge
        expr: circles_mint_and_drain_accounts{window="24h"}

      - record: circles:mint_and_drain_accounts_7d:gauge
        expr: circles_mint_and_drain_accounts{window="7d"}

      # High-volume inviters
      - record: circles:high_volume_inviters_24h:gauge
        expr: circles_high_volume_inviters{window="24h"}

      - record: circles:high_volume_inviters_7d:gauge
        expr: circles_high_volume_inviters{window="7d"}

      # Suspicious vs organic accounts
      - record: circles:suspicious_accounts:gauge
        expr: circles_suspicious_accounts

      - record: circles:organic_accounts:gauge
        expr: circles_organic_accounts

      # Ratio of suspicious to total accounts
      - record: circles:suspicious_account_ratio:gauge
        expr: circles_suspicious_accounts / (circles_suspicious_accounts + circles_organic_accounts)

  - name: circles-network-health-aggregations
    interval: 1m
    rules:
      # Average trust connections per avatar
      - record: circles:average_trust_connections:gauge
        expr: circles_average_trust_connections

      # Isolated accounts (no trusts)
      - record: circles:isolated_accounts:gauge
        expr: circles_isolated_accounts

      # Isolation rate
      - record: circles:isolation_rate:gauge
        expr: circles_isolated_accounts / sum(circles_total_humans)

  - name: circles-health-endpoint-aggregations
    interval: 1m
    rules:
      # Service readiness by service
      - record: circles:service_ready:gauge
        expr: probe_success{job="blackbox-ready"}

      # Service liveness by service
      - record: circles:service_alive:gauge
        expr: probe_success{job="blackbox-live"}

      # Health check latency by service
      - record: circles:health_check_latency:gauge
        expr: probe_duration_seconds{job=~"blackbox-.*"}
