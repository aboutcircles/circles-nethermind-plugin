modules:
  # Standard HTTP 2xx check
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4

  # HTTP check for readiness endpoints (allows 503 during startup)
  http_ready:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      follow_redirects: false
      preferred_ip_protocol: ip4

  # TCP connectivity check
  tcp_connect:
    prober: tcp
    timeout: 5s
