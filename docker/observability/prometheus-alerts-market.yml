# ============================================================================
# Circles Market API Alerts
# ============================================================================

groups:
  - name: circles-market-api-alerts
    rules:
      # Service availability
      - alert: MarketApiDown
        expr: up{job="market-api"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Market API is down"
          description: "The Circles Market API has been unreachable for more than 3 minutes."

      - alert: MarketApiNotReady
        expr: probe_success{job="blackbox-ready", service="market-api"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Market API not ready"
          description: "The /health endpoint for Market API has been failing for more than 5 minutes."

      - alert: MarketApiNotAlive
        expr: probe_success{job="blackbox-live", service="market-api"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Market API not responding"
          description: "The /health endpoint for Market API is not responding for more than 3 minutes. The service may have crashed."

      # HTTP error rate alerts
      - alert: MarketApiHighErrorRate
        expr: |
          (
            sum(rate(http_requests_received_total{job="market-api",code=~"5.."}[5m]))
            /
            sum(rate(http_requests_received_total{job="market-api"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in Market API"
          description: "Market API error rate is {{ $value | printf \"%.1f\" }}% (>5%)."

      - alert: MarketApiCriticalErrorRate
        expr: |
          (
            sum(rate(http_requests_received_total{job="market-api",code=~"5.."}[5m]))
            /
            sum(rate(http_requests_received_total{job="market-api"}[5m]))
          ) > 0.15
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate in Market API"
          description: "Market API error rate is {{ $value | printf \"%.1f\" }}% (>15%)."

      # Request latency
      - alert: MarketApiHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="market-api"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency in Market API"
          description: "95th percentile latency is {{ $value | printf \"%.2f\" }}s."

      # Authentication issues
      - alert: MarketApiHighAuthFailureRate
        expr: |
          (
            sum(rate(http_requests_received_total{job="market-api",endpoint="/api/auth/verify",code=~"4.."}[15m]))
            /
            sum(rate(http_requests_received_total{job="market-api",endpoint="/api/auth/verify"}[15m]))
          ) > 0.3
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "More than 30% of authentication verify attempts are failing."

      # External endpoint check (via Caddy)
      - alert: MarketApiExternalDown
        expr: probe_success{job="blackbox-external",instance=~".*market.*"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Market API external endpoint unreachable"
          description: "Cannot reach {{ $labels.instance }}. Users may be affected."

  - name: circles-market-codedispenser-alerts
    rules:
      # CodeDispenser availability
      - alert: CodeDispenserDown
        expr: up{job="market-codedispenser"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "CodeDispenser is down"
          description: "The CodeDispenser adapter has been unreachable for more than 3 minutes."

      - alert: CodeDispenserNotReady
        expr: probe_success{job="blackbox-ready", service="market-adapter-codedispenser"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CodeDispenser not ready"
          description: "The /health endpoint for CodeDispenser has been failing for more than 5 minutes."

      # HTTP error rate
      - alert: CodeDispenserHighErrorRate
        expr: |
          (
            sum(rate(http_requests_received_total{job="market-codedispenser",code=~"5.."}[5m]))
            /
            sum(rate(http_requests_received_total{job="market-codedispenser"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in CodeDispenser"
          description: "CodeDispenser error rate is {{ $value | printf \"%.1f\" }}% (>5%)."

  - name: circles-market-database-alerts
    rules:
      # PostgreSQL connection issues for market-db
      - alert: MarketDbConnectionsHigh
        expr: pg_stat_activity_count{datname="circles_market"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Market DB connections high"
          description: "Market database has {{ $value }} active connections."

      - alert: MarketDbLongRunningQuery
        expr: pg_stat_activity_max_tx_duration{datname="circles_market"} > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Long-running query in Market DB"
          description: "A query has been running for {{ $value | printf \"%.0f\" }} seconds."
