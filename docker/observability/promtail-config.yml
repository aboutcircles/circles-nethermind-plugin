server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Set job label explicitly
      - replacement: docker
        target_label: job
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      # Try JSON parsing for structured logs (Docker json-file driver)
      - match:
          selector: '{job="docker"}'
          stages:
            - json:
                expressions:
                  log: log
                  stream: stream
                  time: time
            - output:
                source: log

      # Parse Caddy access logs to extract route information
      # Caddy JSON logs contain: {"level":"info","ts":...,"logger":"http.log.access","msg":"handled request","request":{"uri":"/pathfinder/..."}}
      - match:
          selector: '{service="caddy"}'
          stages:
            - json:
                expressions:
                  uri: request.uri
                  status: status
                  duration: duration
                  method: request.method
            # Extract route prefix from URI for aggregation
            - regex:
                source: uri
                expression: '^(?P<route>/[^/]*)'
            - labels:
                route:
                method:
                status:
