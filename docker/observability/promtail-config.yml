server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Set job label explicitly
      - replacement: docker
        target_label: job
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      # Try JSON parsing for structured logs (Docker json-file driver)
      - match:
          selector: '{job="docker"}'
          stages:
            - json:
                expressions:
                  log: log
                  stream: stream
                  time: time
            - output:
                source: log

      # Parse Caddy access logs to extract route information
      # Caddy JSON logs contain: {"level":"info","ts":...,"logger":"http.log.access.log0","msg":"handled request","request":{"uri":"/pathfinder/..."}}
      # Note: Only http.log.access logs have the request object with uri field
      - match:
          selector: '{service="caddy"}'
          stages:
            - json:
                expressions:
                  logger: logger
                  uri: request.uri
                  status: status
                  duration: duration
                  method: request.method
            # Only process access logs (not admin API logs)
            - match:
                selector: '{service="caddy"} |= "http.log.access"'
                stages:
                  # Extract route prefix from URI for aggregation
                  - regex:
                      source: uri
                      expression: '^/(?P<route>[^/?]*)'
                  # Map empty route (root path /) to "rpc"
                  - template:
                      source: route
                      template: '{{ if eq .Value "" }}rpc{{ else }}{{ .Value }}{{ end }}'
                  - labels:
                      route:
