global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load rules
rule_files:
  - /etc/prometheus/prometheus-alerts.yml
  - /etc/prometheus/prometheus-recording-rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'nethermind'
    metrics_path: /metrics
    static_configs:
      - targets: ['nethermind-gnosis:6060']

  - job_name: 'pathfinder'
    metrics_path: /metrics
    static_configs:
      - targets: ['pathfinder:8080']

  - job_name: 'rpc'
    metrics_path: /metrics
    static_configs:
      - targets: ['rpc:8080']

  - job_name: 'consensus'
    static_configs:
      - targets: ['consensus-gnosis:5054']

  - job_name: 'cache-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['cache-service:3001']

  - job_name: 'metrics-exporter'
    metrics_path: /metrics
    static_configs:
      - targets: ['metrics-exporter:9100']

  - job_name: 'caddy'
    metrics_path: /metrics
    static_configs:
      - targets: ['caddy:2019']

  # Blackbox exporter - probe /ready endpoints for service health
  - job_name: 'blackbox-ready'
    scrape_interval: 30s
    metrics_path: /probe
    params:
      module: [http_ready]
    static_configs:
      - targets:
        - http://rpc:8080/ready
        - http://pathfinder:8080/ready
        - http://cache-service:3001/ready
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: http://([^:]+):.*
        target_label: service
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox exporter - probe /live endpoints for liveness
  - job_name: 'blackbox-live'
    scrape_interval: 15s
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://rpc:8080/live
        - http://pathfinder:8080/live
        - http://cache-service:3001/live
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: http://([^:]+):.*
        target_label: service
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox exporter - probe Nethermind health endpoint
  - job_name: 'blackbox-nethermind'
    scrape_interval: 30s
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://nethermind-gnosis:8545/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: service
        replacement: nethermind
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox exporter - probe Caddy reverse proxy (internal via admin API)
  # Caddy admin API on port 2019 doesn't require TLS and returns config on GET /config/
  - job_name: 'blackbox-caddy'
    scrape_interval: 30s
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://caddy:2019/config/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: service
        replacement: caddy
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox exporter - probe external HTTPS endpoints (public domain)
  # Also monitors SSL certificate expiry via probe_ssl_earliest_cert_expiry
  # Note: Use /live or /ready endpoints as root paths may return 405 for GET requests
  - job_name: 'blackbox-external'
    scrape_interval: 60s
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
        # Main RPC endpoint (via /live health check)
        - https://staging.circlesubi.network/live
        # Pathfinder service
        - https://staging.circlesubi.network/pathfinder/live
        # Chain RPC (Nethermind health)
        - https://staging.circlesubi.network/chain-rpc/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: https://([^/]+).*
        target_label: domain
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox exporter - probe Lighthouse (consensus) health endpoint
  # Lighthouse returns 200 when synced, 206 when syncing - both are healthy
  - job_name: 'blackbox-consensus'
    scrape_interval: 30s
    metrics_path: /probe
    params:
      module: [http_lighthouse]
    static_configs:
      - targets:
        - http://consensus-gnosis:4000/eth/v1/node/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: service
        replacement: consensus
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox exporter - JSON-RPC functional probes
  # These make actual RPC calls and validate response content (not just HTTP 200)
  - job_name: 'blackbox-rpc-functional'
    scrape_interval: 60s
    scrape_timeout: 30s
    metrics_path: /probe
    static_configs:
      # Each target is: module|target_url|method_name
      # We use relabeling to extract these parts
      - targets:
        - rpc_circles_health|http://rpc:8080|circles_health
        - rpc_circles_tables|http://rpc:8080|circles_tables
        - rpc_circles_getTotalBalance|http://rpc:8080|circles_getTotalBalance
        - rpc_circles_getAvatarInfo|http://rpc:8080|circles_getAvatarInfo
        - rpc_circles_getTrustRelations|http://rpc:8080|circles_getTrustRelations
        - rpc_circles_query|http://rpc:8080|circles_query
        - rpc_circles_events|http://rpc:8080|circles_events
    relabel_configs:
      # Extract module name (before first |)
      - source_labels: [__address__]
        regex: '([^|]+)\|.*'
        target_label: __param_module
      # Extract target URL (between |s)
      - source_labels: [__address__]
        regex: '[^|]+\|([^|]+)\|.*'
        target_label: __param_target
      # Extract method name for labeling
      - source_labels: [__address__]
        regex: '[^|]+\|[^|]+\|(.+)'
        target_label: rpc_method
      # Set instance to target URL
      - source_labels: [__param_target]
        target_label: instance
      # Set service label
      - target_label: service
        replacement: rpc
      # Point to blackbox exporter
      - target_label: __address__
        replacement: blackbox-exporter:9115
