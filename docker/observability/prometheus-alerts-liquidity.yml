groups:
  - name: circles-liquidity-alerts
    rules:
      # ============================================================================
      # Aggregate TVL Alerts (Primary - Low Noise)
      # ============================================================================
      # These alerts use aggregate TVL metrics to catch real attacks without
      # generating noise from individual token volatility.

      # Balancer TVL Warning - moderate drop
      - alert: BalancerTvlDropWarning
        expr: circles_balancer_tvl_change_pct_1h < -5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Balancer TVL dropped {{ $value | printf \"%.1f\" }}% in 1 hour"
          description: "Total value locked in Balancer vaults decreased by {{ $value | printf \"%.1f\" }}%. Current TVL: {{ $externalLabels.circles_balancer_tvl_total | printf \"%.0f\" }} CRC"

      # Balancer TVL Critical - significant drop (possible attack)
      - alert: BalancerTvlDropCritical
        expr: circles_balancer_tvl_change_pct_1h < -10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL: Balancer TVL dropped {{ $value | printf \"%.1f\" }}% in 1 hour"
          description: "Total value locked in Balancer vaults decreased significantly. This may indicate a coordinated drain or attack. Investigate immediately!"

      # Group Treasury TVL Warning
      - alert: GroupTreasuryTvlDropWarning
        expr: circles_group_treasury_tvl_change_pct_1h < -10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Group Treasury TVL dropped {{ $value | printf \"%.1f\" }}% in 1 hour"
          description: "Total collateral across all group treasuries decreased by {{ $value | printf \"%.1f\" }}%."

      # Group Treasury TVL Critical
      - alert: GroupTreasuryTvlDropCritical
        expr: circles_group_treasury_tvl_change_pct_1h < -20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL: Group Treasury TVL dropped {{ $value | printf \"%.1f\" }}% in 1 hour"
          description: "Total collateral across all group treasuries decreased significantly. This may indicate a coordinated redemption or attack."

      # ============================================================================
      # Whale Activity Monitoring (Informational)
      # ============================================================================
      # Whale activity is kept for visibility but not as primary alerts

      # Whale activity spike - many large transfers in short period
      - alert: WhaleActivitySpike
        expr: increase(circles_whale_transfer_total[1h]) > 20
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "High whale activity on {{ $labels.token_address }}"
          description: "{{ $value | printf \"%.0f\" }} whale transfers (>100 CRC each) in last hour. Direction: {{ $labels.direction }}"

      # ============================================================================
      # Low Balance Alerts (Informational)
      # ============================================================================

      # Low treasury balance (absolute threshold)
      - alert: GroupTreasuryLow
        expr: circles_group_treasury_total < 1e18 and circles_group_member_count > 10
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "Low treasury for group {{ $labels.group_name }}"
          description: "Group {{ $labels.group_address }} has {{ $value | printf \"%.2e\" }} wei in treasury with over 10 members"

      # ============================================================================
      # Liquidity Collection Health
      # ============================================================================

      # Collection stale (no updates in 10 minutes, interval is 5 min)
      - alert: LiquidityCollectionStale
        expr: (time() - circles_liquidity_last_collection_timestamp) > 600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Liquidity collection stale"
          description: "No liquidity metrics collected in the last 10 minutes. The collector may be stuck."

      # Multiple collection errors
      - alert: LiquidityCollectionErrors
        expr: increase(circles_liquidity_collection_errors_total[1h]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Liquidity collection errors"
          description: "Multiple errors collecting liquidity metrics: {{ $labels.metric }}. Check database connectivity."

      # Collection taking too long
      - alert: LiquidityCollectionSlow
        expr: |
          rate(circles_liquidity_collection_duration_seconds_total[5m]) * 300 > 60
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Liquidity collection slow"
          description: "Liquidity collection is taking more than 60 seconds. This may indicate database performance issues."
