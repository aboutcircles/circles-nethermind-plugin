global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nethermind'
    metrics_path: /metrics
    static_configs:
      - targets: ['nethermind-gnosis:6060']

  - job_name: 'pathfinder'
    metrics_path: /metrics
    static_configs:
      - targets: ['pathfinder:8080']

  - job_name: 'rpc'
    metrics_path: /metrics
    static_configs:
      - targets: ['rpc:8080']

  - job_name: 'consensus'
    static_configs:
      - targets: ['consensus-gnosis:5054']
