global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load rules
rule_files:
  - /etc/prometheus/prometheus-alerts.yml
  - /etc/prometheus/prometheus-recording-rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nethermind'
    metrics_path: /metrics
    static_configs:
      - targets: ['nethermind-gnosis:6060']

  - job_name: 'pathfinder'
    metrics_path: /metrics
    static_configs:
      - targets: ['pathfinder:8080']

  - job_name: 'rpc'
    metrics_path: /metrics
    static_configs:
      - targets: ['rpc:8080']

  - job_name: 'consensus'
    static_configs:
      - targets: ['consensus-gnosis:5054']

  - job_name: 'cache-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['cache-service:3001']

  - job_name: 'metrics-exporter'
    metrics_path: /metrics
    static_configs:
      - targets: ['metrics-exporter:9100']
