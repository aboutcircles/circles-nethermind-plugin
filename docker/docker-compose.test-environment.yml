# Circles Test Environment
# Provides isolated test sessions with block-filtered database access and Anvil forks
#
# Usage (local build):
#   docker compose -f docker-compose.test-environment.yml build
#   docker compose -f docker-compose.test-environment.yml up -d
#
# Usage (pull from GitHub Container Registry - CI/CD):
#   docker compose -f docker-compose.test-environment.yml up -d --pull always
#
# Requires the circles-gnosis network to exist (from docker-compose.gnosis.yml)
# For local build: requires the circles-test-environment submodule to be checked out
#
# Note: Set TEST_ENV_ENABLED=true in .env to enable Caddy routing to /test-env/*

services:
  test-environment:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-circlesubi}/circles-test-environment:${TEST_ENV_TAG:-dev}
    build:
      context: ../circles-test-environment
      dockerfile: docker/Dockerfile
    container_name: circles-test-environment
    expose:
      - "8080"
    environment:
      - ConnectionStrings__Postgres=Host=postgres-gnosis;Port=5432;Database=postgres;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      - GnosisRpcUrl=${GNOSIS_RPC_URL:-http://nethermind-gnosis:8545}
      - CirclesRpcUrl=${CIRCLES_RPC_URL:-http://rpc:8080}
      # Anvil fork URL - intentionally defaults to production for forking mainnet state
      # Override with ANVIL_FORK_RPC_URL if using a different provider
      - AnvilForkRpcUrl=${ANVIL_FORK_RPC_URL:-https://rpc.gnosischain.com}
      - MaxConcurrentSessions=${TEST_ENV_MAX_SESSIONS:-10}
      - PublicBaseUrl=${TEST_ENV_PUBLIC_BASE_URL:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    networks:
      - circles-gnosis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Note: postgres-gnosis runs in a separate compose project (circles-gnosis)
    # The application handles connection retries via its own health/retry logic

networks:
  circles-gnosis:
    external: true
