server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /tmp/promtail/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
targets:
  - labels:
      job: varlogs
      __path__: /var/log/*.log
  - labels:
      job: docker
      __path__: /var/lib/docker/containers/*/*.log
scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
