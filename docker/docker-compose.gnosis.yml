services:
  jwt-gnosis-secret:
    container_name: jwt-gnosis-secret
    image: alpine:3.20
    restart: unless-stopped
    networks:
      - circles-gnosis
    volumes:
      - ../.state/jwtsecret-gnosis:/jwt
    environment:
      - MY_UID=${MY_UID:-}
      - MY_GID=${MY_GID:-}
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        mkdir -p /jwt
        if [ ! -s /jwt/jwt.hex ]; then
          # keep it simple & reliable: use openssl
          if ! command -v openssl >/dev/null 2>&1; then
            apk add --no-cache openssl >/dev/null 2>&1
          fi
          openssl rand -hex 32 > /jwt/jwt.hex
          chmod 0644 /jwt/jwt.hex
          if [ -n "${MY_UID:-}" ] && [ -n "${MY_GID:-}" ]; then
            chown "${MY_UID}:${MY_GID}" /jwt/jwt.hex || true
          fi
        fi
        exec tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "test -s /jwt/jwt.hex"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 1s

  nethermind-gnosis:
    container_name: nethermind-gnosis
    build:
      context: ..
      dockerfile: docker/Index.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres-gnosis:
        condition: service_healthy
      jwt-gnosis-secret:
        condition: service_healthy
    networks:
      - circles-gnosis
    ports:
      - 30303:30303/tcp # p2p
      - 30303:30303/udp # p2p
      - 8545:8545
    expose:
      - 8551 # engine api
    volumes:
      - ../.state/nethermind-gnosis:/data
      - ../.state/jwtsecret-gnosis/jwt.hex:/jwt.hex
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: |
      --config=gnosis
      --datadir=/data
      --Sync.SnapSync=true
      --Sync.DownloadBodiesInFastSync=true
      --Sync.DownloadReceiptsInFastSync=true
      --Sync.AncientBodiesBarrier=12500000
      --Sync.AncientReceiptsBarrier=12500000
      --Receipt.StoreReceipts=true
      --Receipt.TxLookupLimit=0
      --log=INFO
      --JsonRpc.Enabled=true
      --JsonRpc.Host=0.0.0.0
      --JsonRpc.Port=8545
      --JsonRpc.EnabledModules=[Web3,Eth,Subscribe,Net,Circles,Debug]
      --JsonRpc.JwtSecretFile=/jwt.hex
      --JsonRpc.EngineHost=0.0.0.0
      --JsonRpc.EnginePort=8551
      --Network.DiscoveryPort=30303
      --Network.MaxActivePeers=100
      --HealthChecks.Enabled=true
      --HealthChecks.UIEnabled=true
    env_file:
      - .env
    environment:
      - POSTGRES_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true;
      - POSTGRES_READONLY_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true;
      - START_BLOCK=12500000
      - EXTERNAL_PATHFINDER_URL=http://pathfinder:8080
      - IPFS_GATEWAYS=https://circles-profiles.myfilebase.com
      - IPFS_MAX_PARALLELISM=192

  consensus-gnosis:
    container_name: consensus-gnosis
    image: sigp/lighthouse:v7.1.0
    restart: always
    depends_on:
      nethermind-gnosis:
        condition: service_started
      jwt-gnosis-secret:
        condition: service_healthy
    networks:
      - circles-gnosis
    ports:
      - 9000:9000/tcp # p2p
      - 9000:9000/udp # p2p
      - 5054:5054/tcp # metrics
    expose:
      - 4000 # http
    volumes:
      - ../.state/consensus-gnosis/data:/data
      - ../.state/jwtsecret-gnosis/jwt.hex:/jwt.hex
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: |
      lighthouse
      beacon_node
      --network=gnosis
      --disable-upnp
      --datadir=/data
      --port=9000
      --http
      --http-address=0.0.0.0
      --http-port=4000
      --execution-endpoint=http://nethermind-gnosis:8551
      --execution-jwt=/jwt.hex
      --checkpoint-sync-url=https://checkpoint.gnosischain.com

  cache-service:
    container_name: cache-service
    build:
      context: ..
      dockerfile: docker/cache-service.Dockerfile
    depends_on:
      postgres-gnosis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 3001:3001
    environment:
      - PORT=3001
      - POSTGRES_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - POSTGRES_READONLY_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - PG_NOTIFY_CHANNEL=circles_index_events
      - ROLLBACK_CAPACITY=12
      - MAX_CATCHUP_LAG=100
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 600s

  pathfinder:
    container_name: pathfinder
    build:
      context: ..
      dockerfile: docker/pathfinder-host.Dockerfile
    depends_on:
      - nethermind-gnosis
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 8080:8080
    environment:
      - NETHERMIND_RPC_URL=http://nethermind-gnosis:8545
      - POSTGRES_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - POSTGRES_READONLY_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};

  rpc:
    container_name: rpc
    build:
      context: ..
      dockerfile: docker/rpc-host.Dockerfile
    depends_on:
      - nethermind-gnosis
      - pathfinder
      # Optional: uncomment to wait for cache service
      # cache-service:
      #   condition: service_healthy
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 8081:8080
    environment:
      - POSTGRES_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - POSTGRES_READONLY_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - EXTERNAL_PATHFINDER_URL=http://pathfinder:8080
      - NETHERMIND_RPC_URL=http://nethermind-gnosis:8545
      - BALANCE_MODE=live
      # Cache Service Configuration (optional)
      # Uncomment to enable cache service usage:
      - CACHE_SERVICE_URL=http://cache-service:3001
      - USE_CACHE_SERVICE=true

  profile-service:
    container_name: profile-service
    image: jaensen/circles-profile-pinning-service:0.5.0-rc1
    depends_on:
      - nethermind-gnosis
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 3000:3000
    volumes:
      - ../.state/profile-service:/data
    env_file:
      - .env

  postgres-gnosis:
    container_name: postgres-gnosis
    image: postgres:17
    command: -c 'max_connections=100'
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 5432:5432
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ../.state/postgres-gnosis:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s


networks:
  circles-gnosis:
    name: circles-gnosis
