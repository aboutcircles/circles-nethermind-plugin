services:
  jwt-gnosis-secret:
    image: alpine:3.20
    restart: unless-stopped
    networks:
      - circles-gnosis
    volumes:
      - ../.state/jwtsecret-gnosis:/jwt
    environment:
      - MY_UID=${MY_UID:-}
      - MY_GID=${MY_GID:-}
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        mkdir -p /jwt
        if [ ! -s /jwt/jwt.hex ]; then
          # keep it simple & reliable: use openssl
          if ! command -v openssl >/dev/null 2>&1; then
            apk add --no-cache openssl >/dev/null 2>&1
          fi
          openssl rand -hex 32 > /jwt/jwt.hex
          chmod 0644 /jwt/jwt.hex
          if [ -n "${MY_UID:-}" ] && [ -n "${MY_GID:-}" ]; then
            chown "${MY_UID}:${MY_GID}" /jwt/jwt.hex || true
          fi
        fi
        exec tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "test -s /jwt/jwt.hex"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 1s

  nethermind-gnosis:
    build:
      context: ..
      dockerfile: docker/Index.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres-gnosis:
        condition: service_started
      jwt-gnosis-secret:
        condition: service_healthy
    networks:
      - circles-gnosis
    ports:
      - 30303:30303/tcp # p2p
      - 30303:30303/udp # p2p
      - 8545:8545
    expose:
      - 8551 # engine api
    volumes:
      - ../.state/nethermind-gnosis:/data
      - ../.state/jwtsecret-gnosis/jwt.hex:/jwt.hex
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: |
      --config=gnosis
      --datadir=/data
      --log=INFO
      --JsonRpc.Enabled=true
      --JsonRpc.Host=0.0.0.0
      --JsonRpc.Port=8545
      --JsonRpc.EnabledModules=[Web3,Eth,Subscribe,Net,Circles]
      --JsonRpc.JwtSecretFile=/jwt.hex
      --JsonRpc.EngineHost=0.0.0.0
      --JsonRpc.EnginePort=8551
      --Network.DiscoveryPort=30303
      --Network.MaxActivePeers=100
      --HealthChecks.Enabled=false
    env_file:
      - .env
    environment:
      - POSTGRES_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true;
      - POSTGRES_READONLY_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true;
      - START_BLOCK=12000000
      - EXTERNAL_PATHFINDER_URL=http://pathfinder:8080
      - IPFS_GATEWAYS=https://circles-profiles.myfilebase.com
      - IPFS_MAX_PARALLELISM=192

  consensus-gnosis:
    container_name: consensus-gnosis
    image: sigp/lighthouse:v7.1.0
    restart: always
    depends_on:
      nethermind-gnosis:
        condition: service_started
      jwt-gnosis-secret:
        condition: service_healthy
    networks:
      - circles-gnosis
    ports:
      - 9000:9000/tcp # p2p
      - 9000:9000/udp # p2p
      - 5054:5054/tcp # metrics
    expose:
      - 4000 # http
    volumes:
      - ../.state/consensus-gnosis/data:/data
      - ../.state/jwtsecret-gnosis/jwt.hex:/jwt.hex
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: |
      lighthouse
      beacon_node
      --network=gnosis
      --disable-upnp
      --datadir=/data
      --port=9000
      --http
      --http-address=0.0.0.0
      --http-port=4000
      --execution-endpoint=http://nethermind-gnosis:8551
      --execution-jwt=/jwt.hex
      --checkpoint-sync-url=https://checkpoint.gnosischain.com

  pathfinder:
    build:
      context: ..
      dockerfile: docker/pathfinder-host.Dockerfile
    depends_on:
      - nethermind-gnosis
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 8081:8080
    environment:
      - CIRCLES_RPC_URL=http://nethermind-gnosis:8545
      - POSTGRES_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - POSTGRES_READONLY_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};

  rpc:
    build:
      context: ..
      dockerfile: docker/rpc-host.Dockerfile
    depends_on:
      - nethermind-gnosis
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 8082:8080
    environment:
      - CIRCLES_RPC_URL=http://nethermind-gnosis:8545
      - POSTGRES_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - POSTGRES_READONLY_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};

  profile-service:
    image: jaensen/circles-profile-pinning-service:0.5.0-rc1
    depends_on:
      - nethermind-gnosis
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 3000:3000
    volumes:
      - ../.state/profile-service:/data
    env_file:
      - .env

  postgres-gnosis:
    image: postgres:17
    command: -c 'max_connections=100'
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 5432:5432
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ../.state/postgres-gnosis:/var/lib/postgresql/data

networks:
  circles-gnosis:
    name: circles-gnosis
