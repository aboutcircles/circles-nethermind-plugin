  #     - /etc/timezone:/etc/timezone:ro
  #     - /etc/localtime:/etc/localtime:ro
  #   command: |
  #     lighthouse
  #     beacon_node
  #     --network=gnosis
  #     --disable-upnp
  #     --datadir=/data
  #     --port=9000
  #     --http
  #     --http-address=0.0.0.0
  #     --http-port=4000
  #     --execution-endpoint=http://nethermind-gnosis:8551
  #     --execution-jwt=/jwt.hex
  #     --checkpoint-sync-url=https://checkpoint.gnosischain.com

networks:
  circles-gnosis:
    name: circles-gnosis
