# Circles Docker Compose with Caddy Reverse Proxy
#
# DEPLOYMENT: This stack is deployed via Ansible, which sets environment
# variables (DOMAIN, SERVER_IP, etc.) instead of using .env files.
# See: https://github.com/circlesland/infrastructure
#
# For local development: docker compose -f docker-compose.caddy.yml up -d
#
# Services included:
# - caddy: Reverse proxy with automatic HTTPS (TLS via Let's Encrypt)
# - nethermind-gnosis: Execution client with Circles indexer
# - rpc: Circles RPC host
# - profile-service: Profile pinning service
# - pathfinder: Path computation service
#
# Optional (uncomment to enable):
# - consensus-gnosis: Lighthouse beacon node
#
# Excluded services:
# - postgres (use external or add separately)
# - cache-service
# - jwt-secret generator
#
# Required environment variables (set by Ansible or export manually):
# - DOMAIN: Public domain for TLS cert (e.g., staging.circlesubi.network)
# - SERVER_IP: Server IP for HTTP-only dashboard access (optional)

services:
  caddy:
    container_name: caddy
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../.state/caddy/data:/data
      - ../.state/caddy/config:/config
    env_file:
      - .env
    depends_on:
      - nethermind-gnosis
      - rpc
      - profile-service
      - pathfinder

  nethermind-gnosis:
    container_name: nethermind-gnosis
    build:
      context: ..
      dockerfile: docker/Index.Dockerfile
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 30303:30303/tcp # p2p
      - 30303:30303/udp # p2p
    expose:
      - 8545 # json-rpc (internal only)
      - 8551 # engine api
    volumes:
      - ../.state/nethermind-gnosis:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: |
      --config=gnosis
      --datadir=/data
      --Sync.SnapSync=true
      --Sync.DownloadBodiesInFastSync=true
      --Sync.DownloadReceiptsInFastSync=true
      --Sync.AncientBodiesBarrier=12500000
      --Sync.AncientReceiptsBarrier=12500000
      --Receipt.StoreReceipts=true
      --Receipt.TxLookupLimit=0
      --log=INFO
      --JsonRpc.Enabled=true
      --JsonRpc.Host=0.0.0.0
      --JsonRpc.Port=8545
      --JsonRpc.EnabledModules=[Web3,Eth,Subscribe,Net,Circles,Debug]
      --JsonRpc.EngineHost=0.0.0.0
      --JsonRpc.EnginePort=8551
      --Network.DiscoveryPort=30303
      --Network.MaxActivePeers=100
      --HealthChecks.Enabled=true
      --HealthChecks.UIEnabled=true
    env_file:
      - .env
    environment:
      - POSTGRES_CONNECTION_STRING=Server=${POSTGRES_HOST:-postgres-gnosis};Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true;
      - POSTGRES_READONLY_CONNECTION_STRING=Server=${POSTGRES_HOST:-postgres-gnosis};Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true;
      - START_BLOCK=12500000
      - EXTERNAL_PATHFINDER_URL=http://pathfinder:8080
      - IPFS_GATEWAYS=https://circles-profiles.myfilebase.com
      - IPFS_MAX_PARALLELISM=192

  pathfinder:
    container_name: pathfinder
    build:
      context: ..
      dockerfile: docker/pathfinder-host.Dockerfile
    depends_on:
      - nethermind-gnosis
    restart: unless-stopped
    networks:
      - circles-gnosis
    expose:
      - 8080 # internal only
    environment:
      - NETHERMIND_RPC_URL=http://nethermind-gnosis:8545
      - POSTGRES_CONNECTION_STRING=Server=${POSTGRES_HOST:-postgres-gnosis};Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - POSTGRES_READONLY_CONNECTION_STRING=Server=${POSTGRES_HOST:-postgres-gnosis};Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};

  rpc:
    container_name: rpc
    build:
      context: ..
      dockerfile: docker/rpc-host.Dockerfile
    depends_on:
      - nethermind-gnosis
      - pathfinder
    restart: unless-stopped
    networks:
      - circles-gnosis
    expose:
      - 8080 # internal only, accessed via caddy
    environment:
      - POSTGRES_CONNECTION_STRING=Server=${POSTGRES_HOST:-postgres-gnosis};Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - POSTGRES_READONLY_CONNECTION_STRING=Server=${POSTGRES_HOST:-postgres-gnosis};Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - EXTERNAL_PATHFINDER_URL=http://pathfinder:8080
      - NETHERMIND_RPC_URL=http://nethermind-gnosis:8545
      - BALANCE_MODE=live
      # Cache Service disabled
      # - CACHE_SERVICE_URL=http://cache-service:3001
      # - USE_CACHE_SERVICE=true

  profile-service:
    container_name: profile-service
    image: jaensen/circles-profile-pinning-service:0.5.0-rc1
    depends_on:
      - nethermind-gnosis
    restart: unless-stopped
    networks:
      - circles-gnosis
    expose:
      - 3000 # internal only, accessed via caddy
    volumes:
      - ../.state/profile-service:/data
    env_file:
      - .env

  # ============================================
  # OPTIONAL: Consensus Client (Lighthouse)
  # Uncomment the following service to enable
  # ============================================
  # consensus-gnosis:
  #   container_name: consensus-gnosis
  #   image: sigp/lighthouse:v7.1.0
  #   restart: always
  #   depends_on:
  #     - nethermind-gnosis
  #   networks:
  #     - circles-gnosis
  #   ports:
  #     - 9000:9000/tcp # p2p
  #     - 9000:9000/udp # p2p
  #     - 5054:5054/tcp # metrics
  #   expose:
  #     - 4000 # http
  #   volumes:
  #     - ../.state/consensus-gnosis/data:/data
