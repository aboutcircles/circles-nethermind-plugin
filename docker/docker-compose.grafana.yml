services:
  grafana:
    container_name: grafana
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    user: "${MY_UID:-10000}:${MY_GID:-10000}"
    networks:
      - circles-gnosis
    expose:
      - 3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      # User sign-up settings
      # Set GRAFANA_ALLOW_SIGN_UP=true in .env to enable sign-ups
      - GF_USERS_ALLOW_SIGN_UP=${GRAFANA_ALLOW_SIGN_UP:-false}
      # Restrict sign-ups to specific email domain (e.g., "aboutcircles.com")
      # Set GRAFANA_ALLOWED_EMAIL_DOMAIN in .env to restrict
      - GF_USERS_ALLOWED_DOMAINS=${GRAFANA_ALLOWED_EMAIL_DOMAIN:-}
      # Auto-assign org to new users
      - GF_USERS_AUTO_ASSIGN_ORG=true
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=${GRAFANA_DEFAULT_ROLE:-Viewer}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3002}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Anonymous access (read-only dashboards without login)
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS_ACCESS:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ../.state/grafana:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    # Note: prometheus and loki are in docker-compose.observability.yml
    # They communicate via the shared circles-gnosis network

networks:
  circles-gnosis:
    external: true
