services:
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.54.0
    restart: unless-stopped
    user: "${MY_UID:-65534}:${MY_GID:-65534}"
    networks:
      - circles-gnosis
    expose:
      - 9090
    volumes:
      - ../.state/prometheus:/prometheus
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - ./observability/prometheus-recording-rules.yml:/etc/prometheus/prometheus-recording-rules.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=365d
      - --web.enable-lifecycle

  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:v1.8.1
    restart: unless-stopped
    pid: host
    networks:
      - circles-gnosis
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|run|var/lib/docker/.+)($|/)

  cadvisor:
    container_name: cadvisor
    # v0.54.1 includes fix for containerd-snapshotter support (PR #3709)
    image: ghcr.io/google/cadvisor:0.54.1
    restart: unless-stopped
    privileged: true
    networks:
      - circles-gnosis
    expose:
      - 8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    command:
      - --housekeeping_interval=30s
      - --docker_only=true

  loki:
    container_name: loki
    image: grafana/loki:3.0.0
    restart: unless-stopped
    user: "${MY_UID:-10001}:${MY_GID:-10001}"
    networks:
      - circles-gnosis
    expose:
      - 3100
    volumes:
      - ../.state/loki:/loki
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    container_name: promtail
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    networks:
      - circles-gnosis
    volumes:
      - ../.state/promtail:/tmp/promtail
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  metrics-exporter:
    container_name: metrics-exporter
    build:
      context: ../
      dockerfile: docker/metrics-exporter.Dockerfile
    restart: unless-stopped
    networks:
      - circles-gnosis
    expose:
      - 9100
    environment:
      - ConnectionStrings__CirclesDb=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - Metrics__CollectionIntervalSeconds=60
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/ready"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

  alertmanager:
    container_name: alertmanager
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    user: "${MY_UID:-65534}:${MY_GID:-65534}"
    networks:
      - circles-gnosis
    expose:
      - 9093
    volumes:
      - ../.state/alertmanager:/alertmanager
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-0}
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Substitute environment variables using sed (busybox compatible)
        sed -e "s|\$${SLACK_WEBHOOK_URL}|$SLACK_WEBHOOK_URL|g" \
            -e "s|\$${TELEGRAM_BOT_TOKEN}|$TELEGRAM_BOT_TOKEN|g" \
            -e "s|\$${TELEGRAM_CHAT_ID}|$TELEGRAM_CHAT_ID|g" \
            /etc/alertmanager/alertmanager.yml.tmpl > /alertmanager/alertmanager.yml
        # Start alertmanager
        exec /bin/alertmanager --config.file=/alertmanager/alertmanager.yml --storage.path=/alertmanager

  blackbox-exporter:
    container_name: blackbox-exporter
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    networks:
      - circles-gnosis
    expose:
      - 9115
    volumes:
      - ./observability/blackbox-exporter.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - --config.file=/etc/blackbox_exporter/config.yml

networks:
  circles-gnosis:
    external: true
