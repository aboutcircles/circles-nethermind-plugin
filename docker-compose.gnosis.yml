services:
  nethermind-gnosis:
    build:
      context: .
      dockerfile: x64.Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres-gnosis
    networks:
      - circles-gnosis
    ports:
      - 30303:30303/tcp # p2p
      - 30303:30303/udp # p2p
      - 8545:8545
    expose:
      - 8551 # engine api
    volumes:
      - .state/nethermind-gnosis:/data
      - .state/jwtsecret-gnosis/jwt.hex:/jwt.hex
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: |
      --config=gnosis
      --datadir=/data
      --log=INFO
      --JsonRpc.Enabled=true
      --JsonRpc.Host=0.0.0.0
      --JsonRpc.Port=8545
      --JsonRpc.EnabledModules=[Web3,Eth,Subscribe,Net,Circles]
      --JsonRpc.JwtSecretFile=/jwt.hex
      --JsonRpc.EngineHost=0.0.0.0
      --JsonRpc.EnginePort=8551
      --Network.DiscoveryPort=30303
      --HealthChecks.Enabled=false
    env_file:
      - .env
    environment:
      - V1_HUB_ADDRESS=0x29b9a7fBb8995b2423a71cC17cf9810798F6C543
      - V2_HUB_ADDRESS=0xc12C1E50ABB450d6205Ea2C3Fa861b3B834d13e8
      - V1_NAME_REGISTRY_ADDRESS=0x1eaD7F904F6fFC619c58B85e04F890b394E08172
      - V2_NAME_REGISTRY_ADDRESS=0xA27566fD89162cC3D40Cb59c87AAaA49B85F3474
      - V2_STANDARD_TREASURY_ADDRESS=0x08F90aB73A515308f03A718257ff9887ED330C6e
      - V2_ERC20_LIFT_ADDRESS=0x5F99a795dD2743C36D63511f0D4bc667e6d3cDB5
      - V2_LBP_FACTORY_ADDRESS=0xecEd91232C609A42F6016860E8223B8aEcaA7bd0
      - V2_CMGROUP_DEPLOYER=0x55785b41703728f1F1F05E77e22B13c3FCc9ce65,0xFEca40Eb02FB1f4F5F795fC7a03c1A27819B1Ded
      # Circles safe proxy factory address (original circles safe factory): 0x8b4404DE0CaECE4b966a9959f134f0eFDa636156
      # Safe Proxy Factory v1.0.0: 0x12302fE9c02ff50939BaAaaf415fc226C078613C
      # Safe Proxy Factory v1.1.1: 0x76E2cFc1F5Fa8F6a5b3fC4c8F4788F0116861F9B
      # Safe Proxy Factory v1.3.0: 0xA6B71E26C5e0845f74C812102Ca7114b6a896Ab2
      # Safe Proxy Factory v1.4.1: 0x4e1DCf7AD4e460CfD30791CCC4F9c8a4f820ec67
      - SAFE_PROXY_FACTORY_ADDRESSES=0x8b4404DE0CaECE4b966a9959f134f0eFDa636156,0x12302fE9c02ff50939BaAaaf415fc226C078613C,0x76E2cFc1F5Fa8F6a5b3fC4c8F4788F0116861F9B,0xA6B71E26C5e0845f74C812102Ca7114b6a896Ab2,0x4e1DCf7AD4e460CfD30791CCC4F9c8a4f820ec67
      - BASE_GROUP_DEPLOYER=0xD0B5Bd9962197BEaC4cbA24244ec3587f19Bd06d
      - POSTGRES_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true;
      - POSTGRES_READONLY_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true;
      - START_BLOCK=12000000
      - EXTERNAL_PATHFINDER_URL=http://pathfinder:8080
  
  pathfinder:
    build:
      context: .
      dockerfile: pathfinder-host.Dockerfile
    depends_on:
      - nethermind-gnosis
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 8081:8080
    environment:
      - CIRCLES_RPC_URL=http://nethermind-gnosis:8545
      - POSTGRES_READONLY_CONNECTION_STRING=Server=postgres-gnosis;Port=5432;Database=postgres;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};

  postgres-gnosis:
    image: postgres:16
    command: -c 'max_connections=100'
    restart: unless-stopped
    networks:
      - circles-gnosis
    ports:
      - 5432:5432
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ./.state/postgres-gnosis:/var/lib/postgresql/data

  consensus-gnosis:
    container_name: consensus-gnosis
    image: sigp/lighthouse:v5.3.0-amd64-modern
    restart: always
    networks:
      - circles-gnosis
    ports:
      - 9000:9000/tcp # p2p
      - 9000:9000/udp # p2p
      - 5054:5054/tcp # metrics
    expose:
      - 4000 # http
    volumes:
      - .state/consensus-gnosis/data:/data
      - .state/jwtsecret-gnosis/jwt.hex:/jwt.hex
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: |
      lighthouse
      beacon_node
      --network=gnosis
      --disable-upnp
      --datadir=/data
      --port=9000
      --http
      --http-address=0.0.0.0
      --http-port=4000
      --execution-endpoint=http://nethermind-gnosis:8551
      --execution-jwt=/jwt.hex
      --checkpoint-sync-url=https://checkpoint.gnosis.gateway.fm/

networks:
  circles-gnosis:
    name: circles-gnosis
