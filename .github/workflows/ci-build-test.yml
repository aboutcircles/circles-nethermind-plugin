name: CI - Build and Test

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build -c Release --no-restore

      - name: Run unit tests
        run: |
          chmod +x ./scripts/test.sh
          ./scripts/test.sh --coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/
          retention-days: 30

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: TestResults/coverage/
          retention-days: 30

      - name: Comment test results on PR
        if: github.event_name == 'pull_request' && always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            TestResults/**/*.trx
          comment_mode: always

  # Snapshot tests run against staging test environment
  # These tests validate database queries and business logic against real blockchain state
  snapshot-tests:
    runs-on: ubuntu-latest
    # Now runs on PRs too - test-env returns sanitized errors (no credential exposure)
    needs: build-and-test

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build -c Release --no-restore

      - name: Run snapshot tests
        env:
          TEST_ENV_URL: https://staging.circlesubi.network/test-env
        run: |
          # -m:1 serializes test assemblies: the staging test-env enforces a global
          # 10-session cap, and parallel assemblies (each holding sessions for shared
          # graph/anvil caches) exhaust it.
          dotnet test --no-build -c Release -m:1 \
            --filter "Category=Snapshot" \
            --logger "trx;LogFileName=snapshot-tests.trx" \
            --results-directory TestResults/snapshot

      - name: Upload snapshot test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-test-results
          path: TestResults/snapshot/
          retention-days: 30

  # Regression tests specifically for known bug scenarios
  regression-tests:
    runs-on: ubuntu-latest
    # Now runs on PRs too - test-env returns sanitized errors (no credential exposure)
    # Chained after snapshot-tests (not just build-and-test) so the two jobs never
    # compete for the test-env's global 10-session cap.
    needs: [build-and-test, snapshot-tests]

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build -c Release --no-restore

      - name: Run regression tests
        env:
          TEST_ENV_URL: https://staging.circlesubi.network/test-env
        run: |
          # -m:1: see snapshot-tests — bounded by the test-env global session cap.
          dotnet test --no-build -c Release -m:1 \
            --filter "Category=Regression" \
            --logger "trx;LogFileName=regression-tests.trx" \
            --results-directory TestResults/regression

      - name: Upload regression test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-results
          path: TestResults/regression/
          retention-days: 30
