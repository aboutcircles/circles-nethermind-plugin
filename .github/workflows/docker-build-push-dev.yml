name: Build and Push Docker Images (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push circles-client (dev)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Index.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nethermind-circlesubi:dev
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/nethermind-circlesubi:buildcache-dev
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/nethermind-circlesubi:buildcache-dev,mode=max

      - name: Build & push pathfinder (dev)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/pathfinder-host.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-host:dev
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-host:buildcache-dev
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-host:buildcache-dev,mode=max

      - name: Build & push rpc (dev)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/rpc-host.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rpc-host:dev
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rpc-host:buildcache-dev
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rpc-host:buildcache-dev,mode=max
