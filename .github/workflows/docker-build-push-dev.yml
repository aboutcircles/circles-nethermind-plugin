name: Build and Push Docker Images (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push circles-client (dev)
        uses: docker/build-push-action@v2
        with:
          context: .
          file: x64.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nethermind-circlesubi:dev

      - name: Build & push pathfinder (dev)
        uses: docker/build-push-action@v2
        with:
          context: .
          file: pathfinder-host.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-host:dev
