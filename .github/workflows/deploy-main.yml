name: Deploy Main Branch

on:
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - 'src/**'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy everything'
        type: boolean
        default: false

jobs:
  # Main branch: run tests, then smart deploy
  # Add additional production steps here later (e.g., tag images as 'latest')
  deploy:
    uses: ./.github/workflows/deploy-staging-smart.yml
    with:
      skip_tests: false  # Always wait for tests on main
    secrets: inherit

  # Example: Add production-specific jobs here
  # tag-release:
  #   needs: deploy
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Tag images as latest
  #       run: ...
