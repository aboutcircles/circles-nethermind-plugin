name: Build and Push Docker Images (release)

on:
  release:
    types: [published]

jobs:
  build-and-push-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push circles-client (release)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Index.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Tag with the GitHub release version (e.g., v1.2.3) and also 'latest'
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nethermind-circlesubi:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nethermind-circlesubi:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/nethermind-circlesubi:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/nethermind-circlesubi:buildcache,mode=max

      - name: Build & push pathfinder (release)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/pathfinder-host.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-host:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-host:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-host:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-host:buildcache,mode=max

      - name: Build & push rpc (release)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/rpc-host.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rpc-host:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rpc-host:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rpc-host:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rpc-host:buildcache,mode=max
