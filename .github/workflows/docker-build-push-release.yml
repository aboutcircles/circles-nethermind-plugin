name: Build and Push Docker Images (release)

on:
  release:
    types: [published]

jobs:
  build-and-push-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push circles-client (release)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Index.Dockerfile
          push: true
          # Tag with the GitHub release version (e.g., v1.2.3)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nethermind-circlesubi:${{ github.event.release.tag_name }}

      - name: Build & push pathfinder (release)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/pathfinder-host.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-host:${{ github.event.release.tag_name }}

      - name: Build & push rpc (release)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/rpc-host.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rpc-host:${{ github.event.release.tag_name }}
