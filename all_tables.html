<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Circles Tables</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background: #f8f8f8;
    }

    h1 {
      margin-bottom: 10px;
    }

    /* Collapsible containers */
    .collapsible-header {
      cursor: pointer;
      background: #ddd;
      border: 1px solid #ccc;
      padding: 8px;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: bold;
    }
    .collapsible-header:hover {
      background: #ccc;
    }

    .collapsible-content {
      border: 1px solid #ccc;
      border-top: none;
      margin-bottom: 20px;
      padding: 10px;
      background: #fff;
    }

    /* Small arrow indicator */
    .arrow {
      font-weight: normal;
      margin-right: 10px;
    }

    /* Table styling */
    .table-header {
      cursor: pointer;
      margin: 10px 0 5px;
      font-weight: bold;
      display: flex;
      justify-content: left;
    }
    .table-content {
      border: 1px solid #ccc;
      border-top: none;
      margin-bottom: 20px;
      padding: 0;
      background: #fff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 0;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 6px 10px;
    }
    th {
      background: #eee;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>
<h1>Circles Tables Overview</h1>
<div id="content">Loading data...</div>

<script>
  // Fetch data from the endpoint
  async function fetchCirclesTables() {
    const response = await fetch('https://rpc.aboutcircles.com/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0',
        id: 0,
        method: 'circles_tables',
        params: []
      })
    });

    if (!response.ok) {
      throw new Error(`Request failed (status: ${response.status})`);
    }

    const data = await response.json();
    return data.result || [];
  }

  function createTableElement(tableObj) {
    // Outer container for the table, including a header for clicking
    const tableContainer = document.createElement('div');

    // Collapsible header
    const header = document.createElement('div');
    header.className = 'table-header';
    header.textContent = `${tableObj.table} (${tableObj.topic})`;

    const arrowSpan = document.createElement('span');
    arrowSpan.className = 'arrow';
    arrowSpan.textContent = '►'; // collapsed by default
    header.prepend(arrowSpan);

    // Content area (initially hidden)
    const content = document.createElement('div');
    content.className = 'table-content';
    content.style.display = 'none';

    // Build a small table for columns
    const columnsTable = document.createElement('table');
    const thead = document.createElement('thead');
    thead.innerHTML = `
        <tr>
          <th>Column</th>
          <th>Type</th>
        </tr>
      `;
    columnsTable.appendChild(thead);

    const tbody = document.createElement('tbody');
    tableObj.columns.forEach(col => {
      const row = document.createElement('tr');
      const colCell = document.createElement('td');
      colCell.textContent = col.column;

      const typeCell = document.createElement('td');
      typeCell.textContent = col.type;

      row.appendChild(colCell);
      row.appendChild(typeCell);
      tbody.appendChild(row);
    });

    columnsTable.appendChild(tbody);
    content.appendChild(columnsTable);

    // Toggle logic
    header.addEventListener('click', () => {
      if (content.style.display === 'none') {
        content.style.display = 'block';
        arrowSpan.textContent = '▼'; // expanded
      } else {
        content.style.display = 'none';
        arrowSpan.textContent = '►'; // collapsed
      }
    });

    // Assemble
    tableContainer.appendChild(header);
    tableContainer.appendChild(content);
    return tableContainer;
  }

  function createNamespaceElement(namespaceData) {
    const { namespace, tables } = namespaceData;

    // Container for each namespace
    const container = document.createElement('div');

    // Collapsible header for the namespace
    const nsHeader = document.createElement('div');
    nsHeader.className = 'collapsible-header';
    nsHeader.textContent = `Namespace: ${namespace}`;

    const arrowSpan = document.createElement('span');
    arrowSpan.className = 'arrow';
    arrowSpan.textContent = '▼'; // namespace open by default
    nsHeader.appendChild(arrowSpan);

    // Content area (includes all tables)
    const nsContent = document.createElement('div');
    nsContent.className = 'collapsible-content';
    nsContent.style.display = 'block'; // show by default

    // Build each table in a collapsible container
    tables.forEach(tableObj => {
      const tableElem = createTableElement(tableObj);
      nsContent.appendChild(tableElem);
    });

    // Toggle logic for the namespace
    nsHeader.addEventListener('click', () => {
      if (nsContent.style.display === 'none') {
        nsContent.style.display = 'block';
        arrowSpan.textContent = '▼';
      } else {
        nsContent.style.display = 'none';
        arrowSpan.textContent = '►';
      }
    });

    // Assemble
    container.appendChild(nsHeader);
    container.appendChild(nsContent);

    return container;
  }

  async function init() {
    const content = document.getElementById('content');
    try {
      const result = await fetchCirclesTables();
      content.textContent = ''; // clear loading message

      result.forEach(nsData => {
        const nsElem = createNamespaceElement(nsData);
        content.appendChild(nsElem);
      });
    } catch (err) {
      content.innerHTML = `<p class="error">Failed to load data: ${err.message}</p>`;
    }
  }

  // On page load
  init();
</script>
</body>
</html>
